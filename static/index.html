<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local Civitai Video Wall v2</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header id="topbar" class="topbar">
    <div class="topline">
      <div class="path-row">
        <button id="folderPanelToggle" class="btn" title="Folders" aria-label="Folders">Folders</button>
        <div class="path-combo">
          <button id="favoritePathBtn" class="path-combo-btn" title="Favorite path" aria-label="Favorite path">Favorite</button>
          <input id="pathInput" class="path-input" type="text" placeholder="Enter a video folder path, for example C:\Users\YourName\Videos" spellcheck="false" />
          <button id="pathHistoryToggle" class="path-combo-btn" title="Path history" aria-label="Path history">History</button>
          <div id="pathHistoryMenu" class="path-history-menu hidden"></div>
        </div>
        <button id="chooseFolderBtn" class="btn">Choose Folder</button>
        <button id="scanBtn" class="btn primary">Scan</button>
        <input id="searchInput" class="search" type="search" placeholder="Search filename..." autocomplete="off" />
        <select id="mediaTypeSelect" class="select small" title="Media type">
          <option value="all">All media</option>
          <option value="video">Videos</option>
          <option value="image">Images</option>
        </select>
        <select id="sortSelect" class="select" title="Sort">
          <option value="mtime_desc">Newest modified</option>
          <option value="mtime_asc">Oldest modified</option>
          <option value="name_asc">Filename A-Z</option>
          <option value="name_desc">Filename Z-A</option>
          <option value="size_desc">Size large-small</option>
          <option value="size_asc">Size small-large</option>
          <option value="random">Random order</option>
        </select>
        <select id="columnsSelect" class="select small" title="Grid columns">
          <option value="4">4 cols</option>
          <option value="5">5 cols</option>
          <option value="6">6 cols</option>
          <option value="7">7 cols</option>
          <option value="8">8 cols</option>
          <option value="9">9 cols</option>
          <option value="12">12 cols</option>
          <option value="16">16 cols</option>
        </select>
        <select id="playLimitSelect" class="select small" title="Playback limit">
          <option value="6">Play 6 at once</option>
          <option value="8">Play 8 at once</option>
          <option value="12">Play 12 at once</option>
          <option value="18">Play 18 at once</option>
          <option value="24">Play 24 at once</option>
          <option value="30">Play 30 at once</option>
        </select>
        <button id="pauseBtn" class="btn ghost">Pause All</button>
        <button id="immersiveBtn" class="btn">Immersive</button>
        <button id="settingsToggle" class="btn icon-toggle" title="Settings" aria-label="Settings"></button>
        <div id="settingsMenu" class="settings-menu hidden">
        <div class="settings-section">
          <div id="settingsInterfaceTitle" class="settings-title">Interface</div>
          <button id="langToggle" class="btn settings-btn" title="Switch language" aria-label="Switch language"></button>
          <button id="themeToggle" class="btn settings-btn" title="Toggle theme" aria-label="Toggle theme"></button>
        </div>
        <div class="settings-section">
          <div id="settingsScanTitle" class="settings-title">Scan</div>
          <label class="check settings-check"><input id="rememberPath" type="checkbox" /><span id="rememberPathLabel">Remember path</span></label>
          <label class="check settings-check"><input id="recursiveScan" type="checkbox" /><span id="recursiveScanLabel">Scan subfolders</span></label>
        </div>
        <div class="settings-section">
          <div id="settingsPlaybackTitle" class="settings-title">Playback</div>
          <label class="check settings-check"><input id="wallAutoplay" type="checkbox" checked><span id="wallAutoplayLabel">Auto play wall</span></label>
          <label class="check settings-check"><input id="pauseWhenInactive" type="checkbox"><span id="pauseWhenInactiveLabel">Pause inactive</span></label>
        </div>
        <div class="settings-section">
          <div id="settingsFiltersTitle" class="settings-title">Filters</div>
          <div class="seg settings-seg" id="reviewFilterSeg" title="Review filter">
            <button data-review-filter="all">All</button>
            <button data-review-filter="favorites">Favorites</button>
            <button data-review-filter="selected">Selected</button>
          </div>
          <select id="sizeFilterSelect" class="select settings-select" title="File size">
            <option value="all">Any size</option>
            <option value="small">Under 10 MB</option>
            <option value="medium">10-50 MB</option>
            <option value="large">Over 50 MB</option>
          </select>
          <select id="dateFilterSelect" class="select settings-select" title="Modified date">
            <option value="all">Any date</option>
            <option value="day">Last 24h</option>
            <option value="week">Last 7d</option>
            <option value="month">Last 30d</option>
          </select>
        </div>
        <div class="settings-section">
          <div id="settingsActionsTitle" class="settings-title">Actions</div>
          <button id="clearHistoryBtn" class="btn settings-btn">Clear Path History</button>
          <button id="exportCsvBtn" class="btn settings-btn">Export CSV</button>
        </div>
      </div>
        <button id="expandBtn" class="btn expand hidden">Expand</button>
      </div>
    </div>
  </header>
  <div id="appShell" class="app-shell">
    <aside id="folderPanel" class="folder-panel hidden" aria-label="Folder browser">
      <div class="folder-panel-head">
        <strong id="folderPanelTitle">Folders</strong>
        <button id="folderPanelClose" class="btn ghost">Close</button>
      </div>
      <div class="folder-panel-section">
        <div id="folderFavoritesTitle" class="folder-panel-title">Favorites</div>
        <div id="folderFavorites" class="folder-list"></div>
      </div>
      <div class="folder-panel-section">
        <div id="folderDrivesTitle" class="folder-panel-title">Drives</div>
        <div id="folderTree" class="folder-list folder-tree"></div>
      </div>
    </aside>
    <main id="mainArea">
      <section id="grid" class="video-grid" aria-live="polite"></section>
      <div id="emptyState" class="empty hidden"></div>
    </main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title"><strong id="modalName"></strong><span id="modalMeta"></span></div>
        <div class="modal-actions"><button id="modalSlideshow" class="btn hidden">Slideshow (Fullscreen)</button><button id="modalMoveReview" class="btn">Move to Review</button><button id="modalMoveTrash" class="btn">Move to Trash</button><button id="modalOpenFolder" class="btn">Show in Folder</button><div id="modalVideoControls" class="modal-video-controls hidden"><div id="modalVideoModeSeg" class="seg"><button data-video-mode="loop">Loop</button><button data-video-mode="sequence">Seq</button><button data-video-mode="random">Random</button></div><button id="modalFullscreen" class="btn">Fullscreen</button><button id="modalVideoUiToggle" class="btn ghost">Hide UI</button></div><button id="modalImageUiToggle" class="btn ghost hidden">Hide UI</button><button id="modalClose" class="btn ghost">Close</button></div>
      </div>
      <button id="modalPrev" class="modal-nav modal-nav-prev hidden" aria-label="Previous item">&#8249;</button>
      <button id="modalNext" class="modal-nav modal-nav-next hidden" aria-label="Next item">&#8250;</button>
      <video id="modalVideo" class="modal-video" controls loop autoplay playsinline></video>
      <img id="modalImage" class="modal-image hidden" alt="" />
      <div id="modalHiddenActions" class="modal-hidden-actions hidden">
        <button id="modalHiddenExitFullscreen" class="btn hidden">Exit Fullscreen</button>
        <button id="modalUiShow" class="btn modal-show-ui">Show UI</button>
        <button id="modalHiddenClose" class="btn">Close</button>
      </div>
    </div>
  </div>
  <div id="slideshow" class="slideshow hidden" role="dialog" aria-modal="true">
    <div class="slideshow-stage">
      <img id="slideshowImageA" class="slideshow-image" alt="" />
      <img id="slideshowImageB" class="slideshow-image hidden" alt="" />
    </div>
    <button id="slideshowSidePrev" class="slideshow-nav slideshow-nav-prev" aria-label="Previous image">&#8249;</button>
    <button id="slideshowSideNext" class="slideshow-nav slideshow-nav-next" aria-label="Next image">&#8250;</button>
    <div class="slideshow-top">
      <div>
        <strong id="slideshowName"></strong>
        <span id="slideshowCounter"></span>
      </div>
      <div class="slideshow-controls">
        <button id="slideshowPrev" class="btn">Prev</button>
        <button id="slideshowPlay" class="btn primary">Pause</button>
        <button id="slideshowNext" class="btn">Next</button>
        <select id="slideshowInterval" class="select small">
          <option value="1">1s</option>
          <option value="2">2s</option>
          <option value="3">3s</option>
          <option value="4">4s</option>
          <option value="5">5s</option>
          <option value="6">6s</option>
          <option value="7">7s</option>
          <option value="8">8s</option>
          <option value="9">9s</option>
          <option value="10">10s</option>
          <option value="11">11s</option>
          <option value="12">12s</option>
          <option value="13">13s</option>
          <option value="14">14s</option>
          <option value="15">15s</option>
        </select>
        <select id="slideshowEffect" class="select">
          <option value="none">None</option>
          <option value="fade">Fade</option>
          <option value="slide">Slide</option>
          <option value="drift">Drift</option>
          <option value="random">Random</option>
        </select>
        <select id="slideshowFit" class="select">
          <option value="contain">Contain</option>
          <option value="cover">Cover</option>
        </select>
        <label class="check"><input id="slideshowLoop" type="checkbox" checked /><span id="slideshowLoopLabel">Loop</span></label>
        <button id="slideshowFullscreen" class="btn">Full Screen</button>
        <button id="slideshowUiToggle" class="btn ghost">Hide</button>
        <button id="slideshowClose" class="btn ghost">Close</button>
      </div>
    </div>
    <div id="slideshowHiddenActions" class="slideshow-hidden-actions hidden">
      <button id="slideshowExitFullscreen" class="btn slideshow-exit-full hidden">Exit Full</button>
      <button id="slideshowUiShow" class="btn slideshow-show-ui">Show UI</button>
      <button id="slideshowBackToPreview" class="btn">Back</button>
    </div>
  </div>
  <div id="subInfo" class="status-bar">Choose a video folder</div>
  <script src="/static/app.js"></script>
</body>
</html>
